<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sistema de Calendário de Viagens Mensais - Gerenciamento de escalas 12x36 para motoristas">
  <title>Calendário de Viagens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Tela 1: Seleção de Mês/Ano -->
    <section id="tela-selecao" class="tela ativa">
      <div class="container">
        <header class="header-principal">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <h1>Calendário de Viagens</h1>
          <p class="subtitulo">Gerenciamento de Escalas 12×36</p>
        </header>

        <div class="seletor-periodo">
          <div class="seletor-grupo">
            <label for="select-mes">Mês</label>
            <select id="select-mes">
              <option value="0">Janeiro</option>
              <option value="1">Fevereiro</option>
              <option value="2">Março</option>
              <option value="3">Abril</option>
              <option value="4">Maio</option>
              <option value="5">Junho</option>
              <option value="6">Julho</option>
              <option value="7">Agosto</option>
              <option value="8">Setembro</option>
              <option value="9">Outubro</option>
              <option value="10">Novembro</option>
              <option value="11">Dezembro</option>
            </select>
          </div>
          <div class="seletor-grupo">
            <label for="select-ano">Ano</label>
            <select id="select-ano"></select>
          </div>
          <button id="btn-abrir-calendario" class="btn-primario">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            Abrir Calendário
          </button>
        </div>

        <div class="resumo-anual">
          <h2>Resumo Anual <span id="resumo-ano-label"></span></h2>
          <div class="tabela-resumo-container">
            <table id="tabela-resumo-anual">
              <thead>
                <tr>
                  <th>Mês</th>
                  <th class="th-motorista"><span class="dot dot-chico"></span>CHICO</th>
                  <th class="th-motorista"><span class="dot dot-claudinei"></span>CLAUDINEI</th>
                  <th class="th-motorista"><span class="dot dot-nilton"></span>NILTON</th>
                  <th class="th-motorista"><span class="dot dot-pablo"></span>PABLO</th>
                </tr>
              </thead>
              <tbody id="tbody-resumo-anual"></tbody>
              <tfoot id="tfoot-resumo-anual"></tfoot>
            </table>
          </div>
        </div>
      </div>
    </section>

    <!-- Tela 2: Calendário Mensal -->
    <section id="tela-calendario" class="tela">
      <div class="container">
        <header class="header-calendario">
          <button id="btn-voltar" class="btn-voltar" title="Voltar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
              <line x1="19" y1="12" x2="5" y2="12"/>
              <polyline points="12,19 5,12 12,5"/>
            </svg>
            Voltar
          </button>
          <div class="navegacao-mes">
            <button id="btn-mes-anterior" class="btn-nav" title="Mês anterior">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
                <polyline points="15,18 9,12 15,6"/>
              </svg>
            </button>
            <h2 id="titulo-mes-ano"></h2>
            <button id="btn-mes-proximo" class="btn-nav" title="Próximo mês">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
                <polyline points="9,6 15,12 9,18"/>
              </svg>
            </button>
          </div>
          <div class="legenda-calendario">
            <span class="legenda-item"><span class="legenda-cor viagem"></span>Dia de Viagem</span>
            <span class="legenda-item"><span class="legenda-cor folga"></span>Dia de Folga</span>
          </div>
        </header>

        <div class="calendario-grid-container">
          <div class="calendario-grid">
            <div class="dia-semana">Dom</div>
            <div class="dia-semana">Seg</div>
            <div class="dia-semana">Ter</div>
            <div class="dia-semana">Qua</div>
            <div class="dia-semana">Qui</div>
            <div class="dia-semana">Sex</div>
            <div class="dia-semana">Sáb</div>
          </div>
          <div id="calendario-dias" class="calendario-grid calendario-dias"></div>
        </div>

        <div class="resumo-mensal">
          <h3>Viagens do Mês</h3>
          <div id="cards-motoristas" class="cards-motoristas"></div>
        </div>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
